<svg
  width="32"
  height="32"
  viewBox="0 0 32 32"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- Box base -->
  <rect
    x="4"
    y="6"
    width="24"
    height="20"
    rx="3"
    fill="#F59E0B"
  />
  <!-- Box top highlight -->
  <rect
    x="4"
    y="6"
    width="24"
    height="8"
    rx="3"
    fill="#FBBF24"
  />
  <!-- Vertical seam -->
  <line
    x1="16"
    y1="6"
    x2="16"
    y2="26"
    stroke="#D97706"
    stroke-width="1"
    opacity="0.8"
  />
  <!-- Horizontal seam -->
  <line
    x1="4"
    y1="14"
    x2="28"
    y2="14"
    stroke="#D97706"
    stroke-width="1"
    opacity="0.8"
  />
</svg>
